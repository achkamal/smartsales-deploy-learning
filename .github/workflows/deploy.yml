name: Build and Push Docker Image

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build Docker Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/smartsales-deploy-learning:latest .

      - name: Push Image to Docker Hub
        run: docker push ${{ secrets.DOCKER_USERNAME }}/smartsales-deploy-learning:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 2233
          script: |
            # 1. Login ke Docker Hub (Sekarang tanpa sudo)
            echo "${{ secrets.DOCKER_TOKEN }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
            
            # 2. Tarik image terbaru
            docker pull ${{ secrets.DOCKER_USERNAME }}/smartsales-deploy-learning:latest
            
            # 3. Hentikan & Hapus container lama jika ada (Auto-Kill)
            docker stop laravel-app || true
            docker rm laravel-app || true
            
            # 4. Bersihkan image lama agar disk VPS tidak penuh (Auto-Prune)
            docker image prune -f
            
            # 5. Jalankan container baru (Port 80 VPS -> Port 8000 Laravel)
            docker run -d --name laravel-app -p 80:8000 ${{ secrets.DOCKER_USERNAME }}/smartsales-deploy-learning:latest