name: Build and Push Docker Image

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build Docker Image
        # Di sini kita pakai nama yang sinkron: smartsales-deploy-learning
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/smartsales-deploy-learning:latest .

      - name: Push Image to Docker Hub
        run: docker push ${{ secrets.DOCKER_USERNAME }}/smartsales-deploy-learning:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 2233
          script: |
            # 1. Login ke Docker Hub (Gunakan Token/Password dari Secrets)
            echo "${{ secrets.DOCKER_TOKEN }}" | sudo -S docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
            
            # 2. Tarik image terbaru (Nama harus SAMA dengan yang di-build di atas)
            sudo -S docker pull ${{ secrets.DOCKER_USERNAME }}/smartsales-deploy-learning:latest
            
            # 3. Berhenti dan hapus container lama agar tidak bentrok
            sudo -S docker stop laravel-app || true
            sudo -S docker rm laravel-app || true
            
            # 4. Jalankan aplikasi Laravel kamu (Port 80 VPS -> 8000 Laravel)
            sudo -S docker run -d --name laravel-app -p 80:8000 ${{ secrets.DOCKER_USERNAME }}/smartsales-deploy-learning:latest